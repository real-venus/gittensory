# ============================================================================
# Self-host PRIVATE per-repo override — GENERIC EXAMPLE, safe to publish
# ============================================================================
#
# Copy this file to `${GITTENSORY_REPO_CONFIG_DIR}/{owner}__{repo}/.gittensory.yml` (or the bare
# `{repo}/.gittensory.yml` folder, or the flat `{owner}__{repo}.yml` file — see ../README.md) and
# edit your copy for a SPECIFIC repo. It is deep-merged OVER global.gittensory.yml: any key it
# doesn't mention is inherited from the global default unchanged.
#
# Replace `owner`/`repo` in the destination path with the real values before using this file.
# ============================================================================

# Overrides ONLY `gate.enabled`, `gate.checkMode`, and `gate.expectedCiContexts` for this repo —
# every other `gate.*` key (e.g. `duplicates`, `linkedIssue`) is inherited from the global default
# untouched.
gate:
  enabled: true
  # This repo goes fully dark (#2852): no "Gittensory Orb Review Agent" check-run at all, overriding
  # the global default above. Reviews/comments/labels/audit and autonomous merge/close all keep
  # working — only the check-run publish is affected. Remove the check from THIS repo's branch-
  # protection required-status-checks before relying on this, or GitHub will show it pending forever.
  checkMode: disabled
  # This repo's own CI job/check names to trust as required when its branch protection is
  # unreadable (a common self-host case — see ../../.gittensory.yml.example). Each repo's CI
  # naming differs, so this is a per-repo override rather than a global default.
  expectedCiContexts:
    - build
    - test

# Array fields REPLACE the global default wholesale, never concatenate with it — this repo's
# wanted-paths guidance is exactly this list, not global's list plus this one.
wantedPaths:
  - src/**

settings:
  # An explicit `null` clears the global default's contributorOpenPrCap for THIS repo only — e.g.
  # for a small, high-trust repo where the instance-wide cap doesn't make sense. Omit this key
  # entirely (rather than setting it to `null`) to just inherit the global cap instead.
  contributorOpenPrCap: null

  # #label-scoping: an explicit `null` also works for the enforcement LABEL names (blacklistLabel/
  # contributorCapLabel/reviewNagLabel) — this repo still closes over-cap PRs (via the global
  # `autonomy.close: auto`) but applies no label when doing so, e.g. because this repo's own
  # `gittensor:*` label taxonomy already covers it. Omit to inherit the global/default label name.
  contributorCapLabel: null

# Unlike wantedPaths above, `features:` is a nested MAPPING, not an array — it deep-merges KEY BY KEY over the
# global default, so overriding e2eTests here doesn't disturb any other converged-feature key the global file
# sets. This repo opts into AI-generated E2E test coverage (#4190/#4189); still requires the operator's
# GITTENSORY_REVIEW_E2E_TESTS env flag to be on fleet-wide, or this override has no effect (master kill-switch).
features:
  e2eTests: true
